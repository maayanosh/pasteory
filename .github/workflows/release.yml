name: Release

# Pushing a tag like v1.2 builds, tests, and publishes Clap.dmg as a GitHub
# Release. workflow_dispatch allows a manual dry run (artifact only, no
# release).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" Resources/Info.plist

      - name: Run tests
        run: make test

      - name: Build DMG
        run: make dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clap-dmg
          path: build/Clap.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" build/Clap.dmg \
            --title "Clap $GITHUB_REF_NAME" \
            --generate-notes
