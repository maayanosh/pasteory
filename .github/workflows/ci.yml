name: CI

on: push

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build app
        run: make build/PasteClone
      - name: Run tests
        run: make test
      - name: Build DMG
        run: make dmg
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clap-dmg
          path: build/Clap.dmg
          retention-days: 14
