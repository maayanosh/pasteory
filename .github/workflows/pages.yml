name: Deploy website

# Publishes site/ to the gh-pages branch, which GitHub serves at
# https://maayanosh.github.io/pasteory/. Branch-based publishing is used
# (rather than the newer actions/deploy-pages flow) because pushing a
# gh-pages branch enables Pages automatically — the Actions flow requires a
# repo admin to enable Pages in Settings first, which the workflow token
# is not allowed to do.
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish site/ to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd site
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy site from ${GITHUB_SHA:0:7}"
          git push --force \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
